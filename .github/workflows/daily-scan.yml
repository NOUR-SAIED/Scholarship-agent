name: ScholarAgent Daily Scan

on:
  # Run every day at 08:00 UTC (09:00 Tunisia time)
  schedule:
    - cron: "0 8 * * *"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_all:
        description: "Re-check all sources (ignore seen IDs)"
        required: false
        default: "false"

jobs:
  scan:
    name: Scan & Filter Scholarships
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit results back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create results directory
        run: mkdir -p results

      - name: Run ScholarAgent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agent.py

      - name: Commit updated results
        run: |
          git config user.name  "ScholarAgent Bot"
          git config user.email "scholar-agent@users.noreply.github.com"
          git add results/
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "chore: update results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
